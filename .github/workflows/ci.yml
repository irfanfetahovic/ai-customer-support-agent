name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install "pytest>=9.0.3" "anyio[trio]>=4.0.0" "ruff>=0.4.0"

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests
        run: pytest tests/unit/ -v

# To make this block merges pull requests when tests fail, go to GitHub → Settings → Branches → add a branch rule for main → enable Require status checks to pass → select Lint & unit tests.
